# Module Finance — calendrier earnings du portefeuille. Copiez en finance.yaml.
# Lu par jarvis-finance.sh : déclenche l'analyse des tickers dont la date d'earnings
# est passée et qui n'ont pas encore de note générée. Voir docs/finance.md.

owner: <Votre Nom>

# Pointeur vers le portfolio (positions + thèses).
portfolio_ref: ~/path/to/portfolio.yaml

# Dossier où sont écrites les notes earnings (<TICKER>-<DATE>.md = preuve "déjà analysé").
output_dir: ~/path/to/notes/Earnings/

notify_telegram: true

# Calendrier prévisionnel. time: BMO | AMC | intraday
earnings_calendar:
  # - ticker: TICK
  #   date: 2026-01-01
  #   period: Q1 2026
  #   time: AMC
