# Catégorisation des repos pour l'affichage du dashboard. Copiez en repos.yaml.
# Le filesystem reste flat — ceci n'est que de la métadonnée logique.
# Repos non listés → catégorie `default`. `excluded` = ignorés du scan.

default: perso
excluded:
  - vendor/some-upstream-clone
supervised:
  - client/example-app
categories:
  client:
    label: Clients
    description: Projets livrés pour des clients payants
    repos:
      - example-app
      - example-intake
  perso:
    label: Perso & business
    description: Infrastructure et projets personnels
    repos:
      - my-jarvis
      - portfolio-site
      - shop-app
  tools:
    label: Tools & modules
    description: Modules pilotés par l'assistant
    repos:
      - finance/finance-engine
urls:
  example-app: https://example-app.vercel.app
  portfolio-site: https://example.com
