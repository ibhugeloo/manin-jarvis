# Watchtower — registre des projets clients à surveiller en prod.
# Copiez en watchtower-projects.yaml. Lu par jarvis-watchtower.sh.
# Une source non configurée → enabled: false (Watchtower skippe gracieusement).
# Voir docs/watchtower.md.

projects:
  - slug: example-app
    name: Example App — Production
    client: ClientCo
    paying: true
    repo: ~/path/to/example-app
    obsidian_note: Projects/example-app.md
    description: >
      Décrivez l'app en une phrase (stack, utilisateurs, criticité).
    deployed_at: 2026-01-01
    status: production
    sentry:
      enabled: true
      org: <your-sentry-org>
      project: <sentry-project-slug>
    vercel:
      enabled: true
      slug: <vercel-project-slug>
    supabase:
      enabled: true
      match_name: <substring-du-nom-projet-supabase>
    # Seuils → 🔴 (poussé sur Telegram)
    red_thresholds:
      sentry_new_unresolved_24h: 1
      vercel_failed_deploy: true
      supabase_security_advisors: 1
    # Seuils → 🟡 (rapport seulement)
    yellow_thresholds:
      sentry_unresolved_total: 5
      vercel_runtime_errors_24h: 10
      supabase_perf_advisors: 1
    # Advisors connus à ignorer (faux positifs assumés, avec justification)
    ignore_supabase_advisors: []
