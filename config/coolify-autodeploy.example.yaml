# Coolify auto-deploy — apps surveillées par jarvis-coolify-autodeploy.sh
#
# Pour chaque app : fetch origin/<branch>, compare le SHA distant au dernier SHA
# déployé (~/.local/var/jarvis-coolify-deployed/<uuid>.sha), déclenche un deploy
# via l'API Coolify si différent. Premier run = enregistre le SHA, ne déploie pas.
#
# Copiez en coolify-autodeploy.yaml et renseignez vos apps.

apps:
  - name: my-app
    uuid: <coolify-app-uuid>
    path: ~/path/to/repo
    branch: main
    fqdn: https://app.example.com
