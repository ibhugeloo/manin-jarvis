<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Mesh — Jarvis Control Room</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FBFBFA;
  --surface: #FFFFFF;
  --surface-warm: #F7F6F3;
  --ink: #2F3437;
  --ink-soft: #585858;
  --muted: #787774;
  --border: #EAEAEA;
  --border-soft: rgba(0,0,0,0.06);
  --accent: #111111;
  --green: #2F8F4D;
  --green-bg: #E8F3EC;
  --amber: #B5762B;
  --amber-bg: #F7EFE0;
  --red: #B83A3A;
  --red-bg: #F5E5E5;
  --role-orchestrator: #B5762B;
  --role-researcher: #5B7BA8;
  --role-builder: #2F8F4D;
  --role-analyst: #6E5BA8;
  --role-critic: #B83A3A;
  --role-tools: #787774;
  --serif: 'Instrument Serif', Georgia, serif;
  --sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --mono: 'Geist Mono', 'SF Mono', monospace;
  --ease: cubic-bezier(0.16, 1, 0.3, 1);
}
[data-theme="dark"] {
  --bg: #0F1114;
  --surface: #181B1F;
  --surface-warm: #1F232A;
  --ink: #E5E5E2;
  --ink-soft: #B5B5B0;
  --muted: #7A7A75;
  --border: #2C3035;
  --border-soft: rgba(255,255,255,0.06);
  --accent: #F5F5F2;
  --green: #6FBE85;
  --green-bg: rgba(111, 190, 133, 0.12);
  --amber: #D4A661;
  --amber-bg: rgba(212, 166, 97, 0.12);
  --red: #D87878;
  --red-bg: rgba(216, 120, 120, 0.12);
  --role-orchestrator: #D4A661;
  --role-researcher: #84A2D6;
  --role-builder: #6FBE85;
  --role-analyst: #A899D6;
  --role-critic: #D87878;
  --role-tools: #9A9A93;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--ink);
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
main { max-width: 1480px; margin: 0 auto; padding: 28px 28px 60px; }

/* Top bar */
header.mesh-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 18px; margin-bottom: 14px;
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  gap: 18px; flex-wrap: wrap;
}
.mesh-brand { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
.mesh-brand .dot-live {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--green); box-shadow: 0 0 10px var(--green);
  animation: pulse 1.6s var(--ease) infinite;
}
@keyframes pulse { 0%,100% { opacity: 1; transform: scale(1);} 50% { opacity: 0.55; transform: scale(0.85);} }
.mesh-brand .title {
  font-family: var(--mono); font-size: 13px; font-weight: 500;
  letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink);
}
.mesh-brand .sep { color: var(--border); }
.mesh-brand .sub {
  font-family: var(--mono); font-size: 11px; color: var(--muted);
  letter-spacing: 0.04em; text-transform: uppercase;
}
.mesh-stats {
  display: flex; gap: 18px; flex-wrap: wrap;
  font-family: var(--mono); font-size: 11px; color: var(--muted);
  letter-spacing: 0.04em; text-transform: uppercase;
}
.mesh-stats b { color: var(--ink); font-weight: 500; margin-left: 6px; }
.mesh-stats .ok { color: var(--green); }
.mesh-actions { display: flex; gap: 8px; align-items: center; }
.mesh-actions .btn {
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.04em;
  text-transform: uppercase; padding: 6px 12px; border-radius: 8px;
  border: 1px solid var(--border); background: var(--surface); color: var(--ink);
  cursor: pointer; transition: background 150ms, border-color 150ms;
  text-decoration: none; display: inline-flex; align-items: center; gap: 6px;
}
.mesh-actions .btn:hover { background: var(--surface-warm); border-color: var(--ink-soft); }

/* Mesh layout */
.mesh-layout {
  display: grid; grid-template-columns: minmax(0, 1fr) 360px; gap: 14px;
  margin-bottom: 38px;
}
@media (max-width: 1100px) {
  .mesh-layout { grid-template-columns: 1fr; }
}
.mesh-canvas-wrap {
  position: relative; background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; overflow: hidden; min-height: 620px;
  background-image:
    linear-gradient(var(--border-soft) 1px, transparent 1px),
    linear-gradient(90deg, var(--border-soft) 1px, transparent 1px);
  background-size: 40px 40px;
}
.mesh-canvas-wrap svg { width: 100%; height: 100%; display: block; cursor: grab; }
.mesh-canvas-wrap svg.is-dragging { cursor: grabbing; }
.mesh-hint {
  position: absolute; bottom: 12px; left: 14px;
  font-family: var(--mono); font-size: 10px; color: var(--muted);
  letter-spacing: 0.04em; text-transform: uppercase;
  display: flex; gap: 14px; pointer-events: none;
}
.mesh-hint kbd {
  background: var(--surface-warm); border: 1px solid var(--border);
  padding: 1px 5px; border-radius: 4px; font-size: 9.5px;
}
.mesh-legend {
  position: absolute; top: 12px; left: 14px;
  display: flex; gap: 12px; flex-wrap: wrap;
  font-family: var(--mono); font-size: 9.5px; color: var(--muted);
  letter-spacing: 0.04em; text-transform: uppercase;
  pointer-events: none;
}
.mesh-legend .lg-item { display: flex; align-items: center; gap: 5px; }
.mesh-legend .lg-dot {
  width: 8px; height: 8px; border-radius: 50%;
  border: 1.5px solid currentColor; background: transparent;
}

/* Inspector panel */
.inspector {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; padding: 0; display: flex; flex-direction: column;
  min-height: 620px; overflow: hidden;
}
.inspector-head {
  padding: 14px 18px 10px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.inspector-head .label {
  font-family: var(--mono); font-size: 10px; color: var(--muted);
  letter-spacing: 0.06em; text-transform: uppercase;
}
.inspector-head .pill {
  font-family: var(--mono); font-size: 10px; padding: 3px 9px; border-radius: 999px;
  letter-spacing: 0.04em; text-transform: uppercase; color: var(--ink);
  background: var(--surface-warm); border: 1px solid var(--border);
}
.inspector-body { padding: 18px; flex: 1; overflow-y: auto; }
.inspector-empty {
  padding: 60px 18px; text-align: center; color: var(--muted);
  font-style: italic; font-size: 13px;
}
.ins-title {
  display: flex; align-items: center; gap: 10px; margin-bottom: 4px;
}
.ins-name {
  font-family: var(--mono); font-size: 18px; font-weight: 500;
  color: var(--ink); letter-spacing: -0.01em; word-break: break-all;
}
.ins-role {
  font-family: var(--mono); font-size: 10.5px; color: var(--muted);
  letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 16px;
}
.ins-grid {
  display: grid; grid-template-columns: 80px 1fr; gap: 6px 14px;
  margin-bottom: 16px;
  font-family: var(--mono); font-size: 11.5px;
}
.ins-grid dt {
  color: var(--muted); letter-spacing: 0.04em; text-transform: uppercase;
  font-size: 10px; padding-top: 2px;
}
.ins-grid dd { color: var(--ink); }
.ins-grid dd .ok { color: var(--green); }
.ins-desc {
  font-size: 12.5px; color: var(--ink-soft); line-height: 1.55;
  padding: 12px 14px; background: var(--surface-warm); border-radius: 8px;
  margin-bottom: 14px; border-left: 2px solid var(--border);
}
.ins-actions { display: flex; flex-direction: column; gap: 8px; }
.ins-btn {
  display: block; width: 100%; padding: 10px 14px; font-family: var(--sans);
  font-size: 12px; font-weight: 500; border: 1px solid var(--border);
  border-radius: 8px; background: var(--surface); color: var(--ink);
  cursor: pointer; transition: all 150ms; text-align: center;
  letter-spacing: 0.04em; text-transform: uppercase;
}
.ins-btn:hover { background: var(--surface-warm); border-color: var(--ink-soft); }
.ins-btn.primary {
  background: var(--ink); color: var(--bg); border-color: var(--ink);
}
.ins-btn.primary:hover { opacity: 0.88; }
.ins-edges-list {
  margin-top: 14px; border-top: 1px solid var(--border); padding-top: 12px;
}
.ins-edges-list h4 {
  font-family: var(--mono); font-size: 10px; color: var(--muted);
  letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 8px;
  font-weight: 500;
}
.ins-edge-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 4px 0; font-family: var(--mono); font-size: 11px; color: var(--ink-soft);
  cursor: pointer;
}
.ins-edge-row:hover { color: var(--ink); }
.ins-edge-row .arrow { color: var(--muted); margin: 0 4px; }
.ins-edge-row .count {
  font-size: 10px; color: var(--muted); padding: 1px 6px; border-radius: 4px;
  background: var(--surface-warm);
}

/* SVG node styling */
.node-group { cursor: pointer; }
.node-circle { transition: stroke-width 180ms var(--ease); }
.node-group:hover .node-circle { stroke-width: 2.5; }
.node-group.is-selected .node-circle { stroke-width: 3; }
.node-group.is-running .node-glow { opacity: 0.9; }
.node-group.is-dimmed { opacity: 0.25; }
.node-label {
  font-family: var(--mono); font-size: 10px; font-weight: 500;
  letter-spacing: 0.04em; text-transform: uppercase; fill: var(--ink);
  pointer-events: none; user-select: none;
}
.node-sublabel {
  font-family: var(--mono); font-size: 8.5px;
  letter-spacing: 0.06em; text-transform: uppercase; fill: var(--muted);
  pointer-events: none; user-select: none;
}
.edge-line { transition: stroke-opacity 180ms var(--ease); }
.edge-line.is-dimmed { stroke-opacity: 0.06; }
.edge-line.is-highlight { stroke-opacity: 0.85; }

/* LaunchAgents below mesh */
.la-section { margin-top: 14px; }
.la-section-head {
  display: flex; align-items: baseline; justify-content: space-between;
  gap: 16px; margin-bottom: 14px; flex-wrap: wrap;
  padding-bottom: 10px; border-bottom: 1px solid var(--border);
}
.la-section-head h2 {
  font-family: var(--serif); font-weight: 400; font-size: 24px;
  letter-spacing: -0.02em; color: var(--ink);
}
.la-section-head .meta {
  font-family: var(--mono); font-size: 11px; color: var(--muted);
  letter-spacing: 0.04em;
}
.la-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 12px;
}
.la-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
  padding: 14px 16px; display: flex; flex-direction: column; gap: 10px;
}
.la-card.is-disabled { opacity: 0.55; background: var(--surface-warm); }
.la-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
.la-name { font-size: 14px; font-weight: 500; color: var(--ink); }
.la-schedule {
  font-family: var(--mono); font-size: 10px; color: var(--muted);
  letter-spacing: 0.03em; margin-top: 3px;
}
.la-tag {
  font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.08em;
  text-transform: uppercase; padding: 3px 8px; border-radius: 999px;
  white-space: nowrap;
}
.la-tag.running { background: var(--green); color: var(--bg); }
.la-tag.waiting { background: var(--surface-warm); color: var(--muted); border: 1px solid var(--border); }
.la-tag.disabled { background: var(--surface-warm); color: var(--muted); border: 1px solid var(--border); }
.la-tag.failed { background: var(--red-bg); color: var(--red); border: 1px solid var(--red); }
.la-meta {
  font-family: var(--mono); font-size: 9.5px; color: var(--muted);
  letter-spacing: 0.03em; display: flex; gap: 12px; flex-wrap: wrap;
}
.la-meta .ok { color: var(--green); }
.la-meta .fail { color: var(--red); }
.la-actions { display: flex; gap: 6px; margin-top: 4px; }
.la-btn {
  flex: 1; padding: 7px 10px; font-family: var(--sans);
  font-size: 11.5px; font-weight: 500; border: 1px solid var(--border);
  border-radius: 6px; background: var(--surface); color: var(--ink);
  cursor: pointer; transition: background 150ms, border-color 150ms;
}
.la-btn:hover { background: var(--surface-warm); border-color: var(--ink-soft); }
.la-btn:active { transform: scale(0.98); }
.la-btn:disabled { opacity: 0.5; cursor: progress; }
.la-btn.toggle.on { background: var(--green-bg); color: var(--green); border-color: var(--green); }

.empty { color: var(--muted); font-style: italic; padding: 18px; text-align: center; }
</style>
</head>
<body>
<main>
  <header class="mesh-header">
    <div class="mesh-brand">
      <span class="dot-live"></span>
      <span class="title">AGENT.MESH</span>
      <span class="sep">·</span>
      <span class="sub">live topology · 30 days</span>
    </div>
    <div class="mesh-stats" id="mesh-stats">
      <span>nodes <b id="stat-nodes">…</b></span>
      <span>links <b id="stat-edges">…</b></span>
      <span>spawns <b id="stat-spawns">…</b></span>
      <span>running <b class="ok" id="stat-running">…</b></span>
      <span id="stat-sources" style="opacity:0.7"></span>
    </div>
    <div class="mesh-actions">
      <button class="btn" id="btn-recenter" title="Recentre la topologie">⟲ recenter</button>
      <button class="btn" id="theme-toggle">◑ thème</button>
      <a class="btn" href="/">← control room</a>
    </div>
  </header>

  <section class="mesh-layout">
    <div class="mesh-canvas-wrap" id="canvas-wrap">
      <div class="mesh-legend" id="legend"></div>
      <svg id="mesh-svg" xmlns="http://www.w3.org/2000/svg"></svg>
      <div class="mesh-hint">
        <span><kbd>click</kbd> inspect</span>
        <span><kbd>drag</kbd> move node</span>
        <span><kbd>esc</kbd> deselect</span>
      </div>
    </div>
    <aside class="inspector">
      <div class="inspector-head">
        <span class="label">// inspect</span>
        <span class="pill" id="ins-pill">—</span>
      </div>
      <div class="inspector-body" id="inspector-body">
        <div class="inspector-empty">Cliquez sur un agent pour l'inspecter.</div>
      </div>
    </aside>
  </section>

  <section class="la-section">
    <div class="la-section-head">
      <h2>LaunchAgents Jarvis</h2>
      <span class="meta" id="la-meta">…</span>
    </div>
    <div class="la-grid" id="la-grid"><div class="empty">Chargement…</div></div>
  </section>
</main>

<script>
const $ = (s) => document.querySelector(s);
const escapeHtml = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

const ROLES = ['orchestrator','researcher','builder','analyst','critic','tools'];
function roleColor(role) {
  return getComputedStyle(document.documentElement).getPropertyValue(`--role-${role || 'tools'}`).trim() || '#888';
}

function fmtRelative(iso) {
  if (!iso) return 'jamais utilisé (30j)';
  const ts = new Date(iso).getTime();
  if (isNaN(ts)) return '—';
  const diff = (Date.now() - ts) / 1000;
  if (diff < 60) return `il y a ${Math.floor(diff)}s`;
  if (diff < 3600) return `il y a ${Math.floor(diff/60)}min`;
  if (diff < 86400) return `il y a ${Math.floor(diff/3600)}h`;
  return `il y a ${Math.floor(diff/86400)}j`;
}

// ---- State ----
let topo = { nodes: [], edges: [] };
let layout = new Map();          // id -> { x, y, vx, vy, fixed, isMain }
let selectedId = null;
let dragNode = null;
let dragOffset = { x: 0, y: 0 };
let svgEl = null;
let containerW = 800, containerH = 600;

// ---- Force-directed layout ----
function initLayout(nodes, edges) {
  // Place main au centre, autres en cercle par rôle puis on simule
  const cx = containerW / 2, cy = containerH / 2;
  const grouped = new Map();
  for (const r of ROLES) grouped.set(r, []);
  for (const n of nodes) {
    if (n.is_root) continue;
    const r = grouped.has(n.role) ? n.role : 'tools';
    grouped.get(r).push(n);
  }
  layout.clear();
  layout.set('main', { x: cx, y: cy, vx: 0, vy: 0, fixed: true, isMain: true });
  // Position initiale par cluster de rôle
  const roleCount = ROLES.filter(r => grouped.get(r).length).length;
  let roleIdx = 0;
  for (const role of ROLES) {
    const list = grouped.get(role);
    if (!list.length) continue;
    const baseAngle = (roleIdx / Math.max(1, roleCount)) * Math.PI * 2;
    for (let i = 0; i < list.length; i++) {
      const angle = baseAngle + (i / list.length) * (Math.PI * 2 / Math.max(1, roleCount)) - (Math.PI / Math.max(1, roleCount));
      const radius = Math.min(containerW, containerH) * 0.32 * (0.85 + 0.3 * Math.random());
      layout.set(list[i].id, {
        x: cx + Math.cos(angle) * radius,
        y: cy + Math.sin(angle) * radius,
        vx: 0, vy: 0, fixed: false, isMain: false,
      });
    }
    roleIdx++;
  }
  // Simulation force-directed
  const edgeMap = edges.map(e => ({
    a: e.source, b: e.target,
    target: e.kind === 'sibling' ? 200 : (160 + Math.max(0, 60 - Math.log2(1 + e.weight) * 20)),
    strength: e.kind === 'sibling' ? 0.015 : 0.05,
  }));
  for (let iter = 0; iter < 480; iter++) {
    // Repulsion entre tous
    const ids = Array.from(layout.keys());
    for (let i = 0; i < ids.length; i++) {
      for (let j = i + 1; j < ids.length; j++) {
        const a = layout.get(ids[i]), b = layout.get(ids[j]);
        let dx = b.x - a.x, dy = b.y - a.y;
        let d2 = dx*dx + dy*dy;
        if (d2 < 400) d2 = 400;
        const force = 28000 / d2;
        const d = Math.sqrt(d2);
        const fx = (dx / d) * force, fy = (dy / d) * force;
        if (!a.fixed) { a.vx -= fx; a.vy -= fy; }
        if (!b.fixed) { b.vx += fx; b.vy += fy; }
      }
    }
    // Attraction sur arêtes
    for (const e of edgeMap) {
      const a = layout.get(e.a), b = layout.get(e.b);
      if (!a || !b) continue;
      const dx = b.x - a.x, dy = b.y - a.y;
      const d = Math.sqrt(dx*dx + dy*dy) || 1;
      const diff = (d - e.target) * e.strength;
      const fx = (dx / d) * diff, fy = (dy / d) * diff;
      if (!a.fixed) { a.vx += fx; a.vy += fy; }
      if (!b.fixed) { b.vx -= fx; b.vy -= fy; }
    }
    // Gravité douce vers centre (faible)
    for (const [id, p] of layout) {
      if (p.fixed) continue;
      p.vx += (cx - p.x) * 0.0025;
      p.vy += (cy - p.y) * 0.0025;
      // Damping et integration
      p.vx *= 0.78; p.vy *= 0.78;
      p.x += p.vx; p.y += p.vy;
      // Bordures
      const m = 70;
      if (p.x < m) { p.x = m; p.vx = 0; }
      if (p.x > containerW - m) { p.x = containerW - m; p.vx = 0; }
      if (p.y < m) { p.y = m; p.vy = 0; }
      if (p.y > containerH - m) { p.y = containerH - m; p.vy = 0; }
    }
  }
}

// ---- Render ----
function neighborsOf(id) {
  const set = new Set();
  for (const e of topo.edges) {
    if (e.source === id) set.add(e.target);
    else if (e.target === id) set.add(e.source);
  }
  return set;
}

function renderMesh() {
  const wrap = $('#canvas-wrap');
  containerW = wrap.clientWidth;
  containerH = wrap.clientHeight;
  if (!layout.size || layout.size !== topo.nodes.length) {
    initLayout(topo.nodes, topo.edges);
  }
  const svg = $('#mesh-svg');
  svgEl = svg;
  svg.setAttribute('viewBox', `0 0 ${containerW} ${containerH}`);
  svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');

  const neigh = selectedId ? neighborsOf(selectedId) : null;

  // Edges
  const edgeSvg = topo.edges.map((e, i) => {
    const a = layout.get(e.source), b = layout.get(e.target);
    if (!a || !b) return '';
    const isHi = selectedId && (e.source === selectedId || e.target === selectedId);
    const isDim = selectedId && !isHi;
    const w = e.kind === 'spawn'
      ? Math.max(0.6, Math.min(2.4, 0.5 + Math.log2(1 + e.weight) * 0.45))
      : Math.max(0.4, Math.min(1.2, 0.3 + Math.log2(1 + e.weight) * 0.25));
    const dash = e.kind === 'sibling' ? 'stroke-dasharray="3 4"' : '';
    const opacity = isHi ? 0.85 : (isDim ? 0.06 : (e.kind === 'sibling' ? 0.18 : 0.32));
    return `<line class="edge-line ${isHi ? 'is-highlight' : ''} ${isDim ? 'is-dimmed' : ''}"
      x1="${a.x}" y1="${a.y}" x2="${b.x}" y2="${b.y}"
      stroke="var(--ink)" stroke-width="${w}" stroke-opacity="${opacity}" ${dash} />`;
  }).join('');

  // Nodes
  const nodeSvg = topo.nodes.map(n => {
    const p = layout.get(n.id);
    if (!p) return '';
    const isMain = n.is_root;
    const r = isMain ? 22 : (n.invocation_count > 0 ? 16 : 12);
    const color = roleColor(n.role);
    const isSelected = selectedId === n.id;
    const isDim = selectedId && !isSelected && !(neigh && neigh.has(n.id));
    const cls = [
      'node-group',
      n.running ? 'is-running' : '',
      isSelected ? 'is-selected' : '',
      isDim ? 'is-dimmed' : '',
    ].join(' ');
    const glow = n.running ? `<circle class="node-glow" cx="${p.x}" cy="${p.y}" r="${r + 8}" fill="${color}" opacity="0.18">
      <animate attributeName="r" values="${r+8};${r+14};${r+8}" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.18;0.05;0.18" dur="2s" repeatCount="indefinite"/>
    </circle>` : '';
    const ring = isMain ? `<circle cx="${p.x}" cy="${p.y}" r="${r + 6}" fill="none" stroke="${color}" stroke-width="1" stroke-opacity="0.35" stroke-dasharray="2 3" />` : '';
    const labelY = p.y + r + 14;
    const subLabelY = p.y + r + 25;
    const role = (n.role || 'tools').toUpperCase();
    return `<g class="${cls}" data-id="${escapeHtml(n.id)}" transform="translate(0,0)">
      ${glow}
      ${ring}
      <circle class="node-circle" cx="${p.x}" cy="${p.y}" r="${r}"
        fill="var(--surface)" stroke="${color}" stroke-width="1.6" />
      ${isMain ? `<circle cx="${p.x}" cy="${p.y}" r="3" fill="${color}" />` : ''}
      <text class="node-label" x="${p.x}" y="${labelY}" text-anchor="middle">${escapeHtml(n.name.toUpperCase())}</text>
      <text class="node-sublabel" x="${p.x}" y="${subLabelY}" text-anchor="middle">${role}</text>
    </g>`;
  }).join('');

  svg.innerHTML = edgeSvg + nodeSvg;

  // Bind events
  svg.querySelectorAll('.node-group').forEach(g => {
    g.addEventListener('mousedown', onNodeMouseDown);
    g.addEventListener('click', (e) => {
      if (didDrag) { didDrag = false; return; }
      e.stopPropagation();
      selectNode(g.dataset.id);
    });
  });
  svg.addEventListener('click', (e) => {
    if (e.target === svg) selectNode(null);
  });
}

let didDrag = false;
function onNodeMouseDown(e) {
  e.preventDefault();
  const id = e.currentTarget.dataset.id;
  const p = layout.get(id);
  if (!p) return;
  dragNode = id;
  didDrag = false;
  const pt = svgPoint(e);
  dragOffset = { x: pt.x - p.x, y: pt.y - p.y };
  svgEl.classList.add('is-dragging');
  document.addEventListener('mousemove', onDragMove);
  document.addEventListener('mouseup', onDragEnd, { once: true });
}
function svgPoint(e) {
  const rect = svgEl.getBoundingClientRect();
  return {
    x: ((e.clientX - rect.left) / rect.width) * containerW,
    y: ((e.clientY - rect.top) / rect.height) * containerH,
  };
}
function onDragMove(e) {
  if (!dragNode) return;
  didDrag = true;
  const pt = svgPoint(e);
  const p = layout.get(dragNode);
  p.x = pt.x - dragOffset.x;
  p.y = pt.y - dragOffset.y;
  renderMesh();
}
function onDragEnd() {
  dragNode = null;
  svgEl.classList.remove('is-dragging');
  document.removeEventListener('mousemove', onDragMove);
}

// ---- Inspector ----
function selectNode(id) {
  selectedId = id;
  renderMesh();
  renderInspector();
}

function renderSourceBadge(n) {
  const src = n.source || 'unknown';
  if (src === 'session') return 'session';
  if (src === 'local') return '<span style="color:var(--green)">local</span> · ~/.claude/agents/';
  if (src === 'project') return `<span style="color:var(--role-analyst)">project</span> · ${escapeHtml(n.source_project || '?')}`;
  if (src === 'plugin') return `<span style="color:var(--role-orchestrator)">plugin</span> · ${escapeHtml(n.source_plugin || '?')}`;
  if (src === 'builtin') return '<span style="color:var(--role-researcher)">builtin</span> · Claude Code';
  return '<span style="color:var(--muted)">unknown</span>';
}

function renderInspector() {
  const body = $('#inspector-body');
  const pill = $('#ins-pill');
  if (!selectedId) {
    pill.textContent = '—';
    body.innerHTML = '<div class="inspector-empty">Cliquez sur un agent pour l\'inspecter.</div>';
    return;
  }
  const n = topo.nodes.find(x => x.id === selectedId);
  if (!n) return;
  pill.textContent = n.name;
  const status = n.running
    ? '<span class="ok">● running</span>'
    : (n.invocation_count > 0 ? 'idle' : '<span style="color:var(--muted)">jamais invoqué (30j)</span>');
  // Liste des arêtes connectées
  const edges = topo.edges
    .filter(e => e.source === selectedId || e.target === selectedId)
    .sort((a, b) => b.weight - a.weight);
  const edgesHtml = edges.length ? edges.map(e => {
    const other = e.source === selectedId ? e.target : e.source;
    const arrow = e.kind === 'spawn'
      ? (e.source === selectedId ? '→' : '←')
      : '↔';
    return `<div class="ins-edge-row" data-target="${escapeHtml(other)}">
      <span><span class="arrow">${arrow}</span>${escapeHtml(other)}</span>
      <span class="count">${e.weight}</span>
    </div>`;
  }).join('') : '<div style="color:var(--muted);font-size:11px;font-style:italic">aucune connexion</div>';

  body.innerHTML = `
    <div class="ins-title">
      <span class="ins-name">${escapeHtml(n.name)}</span>
    </div>
    <div class="ins-role" style="color:${roleColor(n.role)}">${escapeHtml(n.role)}</div>
    <dl class="ins-grid">
      <dt>status</dt><dd>${status}</dd>
      <dt>source</dt><dd>${renderSourceBadge(n)}</dd>
      <dt>edges</dt><dd>${n.edges}</dd>
      <dt>invocations</dt><dd>${n.invocation_count}</dd>
      <dt>last used</dt><dd>${escapeHtml(fmtRelative(n.last_used))}</dd>
      ${n.model ? `<dt>model</dt><dd>${escapeHtml(n.model)}</dd>` : ''}
      ${n.file ? `<dt>file</dt><dd style="word-break:break-all">${escapeHtml(n.file)}</dd>` : ''}
    </dl>
    ${n.description ? `<div class="ins-desc">${escapeHtml(n.description)}</div>` : ''}
    <div class="ins-actions">
      ${n.file ? `<button class="ins-btn" id="btn-open-file">▸ ouvrir ${escapeHtml(n.file)}</button>` : ''}
    </div>
    <div class="ins-edges-list">
      <h4>connexions (${edges.length})</h4>
      ${edgesHtml}
    </div>
  `;
  body.querySelectorAll('.ins-edge-row').forEach(row => {
    row.addEventListener('click', () => selectNode(row.dataset.target));
  });
  const openBtn = body.querySelector('#btn-open-file');
  if (openBtn && n.file) {
    openBtn.addEventListener('click', () => {
      // Ouvrir la définition de l'agent dans VS Code via x-callback (best effort)
      const path = `${escape('~/.claude/agents/' + n.file)}`;
      window.location.href = `vscode://file/${path.replace('~', window.HOME || '$HOME')}`;
    });
  }
}

function renderLegend() {
  const counts = new Map();
  for (const n of topo.nodes) {
    counts.set(n.role, (counts.get(n.role) || 0) + 1);
  }
  const html = ROLES.filter(r => counts.get(r)).map(r => {
    return `<span class="lg-item" style="color:${roleColor(r)}">
      <span class="lg-dot"></span>
      <span>${r} (${counts.get(r)})</span>
    </span>`;
  }).join('');
  $('#legend').innerHTML = html;
}

function renderStats() {
  const s = topo.stats || {};
  $('#stat-nodes').textContent = s.total_nodes ?? topo.nodes.length;
  $('#stat-edges').textContent = s.total_edges ?? topo.edges.length;
  $('#stat-spawns').textContent = s.total_invocations ?? 0;
  $('#stat-running').textContent = s.running_count ?? 0;
  const bs = s.by_source || {};
  const parts = [];
  if (bs.local) parts.push(`local ${bs.local}`);
  if (bs.project) parts.push(`project ${bs.project}`);
  if (bs.plugin) parts.push(`plugin ${bs.plugin}`);
  if (bs.builtin) parts.push(`builtin ${bs.builtin}`);
  if (bs.unknown) parts.push(`? ${bs.unknown}`);
  $('#stat-sources').textContent = parts.length ? '· ' + parts.join(' · ') : '';
}

// ---- Loaders ----
async function loadTopology() {
  try {
    const r = await fetch('/api/agent-topology');
    const next = await r.json();
    // Préserver le layout : on ne réinit que si la liste de nodes change.
    const prevIds = new Set(topo.nodes.map(n => n.id));
    const nextIds = new Set(next.nodes.map(n => n.id));
    const sameNodes = prevIds.size === nextIds.size && [...prevIds].every(id => nextIds.has(id));
    topo = next;
    if (!sameNodes) layout.clear();
    renderStats();
    renderLegend();
    renderMesh();
    if (selectedId && !topo.nodes.find(n => n.id === selectedId)) selectedId = null;
    renderInspector();
  } catch (e) {
    console.error('topology', e);
  }
}

async function loadLaunchAgents() {
  try {
    const r = await fetch('/api/agents');
    const agents = await r.json();
    renderLaunchAgents(agents);
  } catch (e) {
    console.error('launchagents', e);
    $('#la-grid').innerHTML = '<div class="empty">Erreur de chargement</div>';
  }
}

function renderLaunchAgents(agents) {
  const grid = $('#la-grid');
  const meta = $('#la-meta');
  if (!agents || !agents.length) {
    grid.innerHTML = '<div class="empty">Aucun LaunchAgent</div>';
    meta.textContent = '0 agents';
    return;
  }
  const loaded = agents.filter(a => a.loaded).length;
  meta.textContent = `${loaded}/${agents.length} chargés`;
  grid.innerHTML = agents.map(a => {
    let tag;
    if (!a.loaded) tag = '<span class="la-tag disabled">désactivé</span>';
    else if (a.running) tag = '<span class="la-tag running">running</span>';
    else if (a.last_exit && a.last_exit !== '0' && a.last_exit !== '0 (success)') tag = '<span class="la-tag failed">échec</span>';
    else tag = '<span class="la-tag waiting">en attente</span>';
    const cls = a.loaded ? '' : 'is-disabled';
    const metaParts = [];
    if (a.next_run_ts) {
      const diff = Math.max(0, a.next_run_ts - Date.now()/1000);
      let nextStr;
      if (diff < 3600) nextStr = `dans ${Math.floor(diff/60)}min`;
      else if (diff < 86400) nextStr = `dans ${Math.floor(diff/3600)}h`;
      else nextStr = `dans ${Math.floor(diff/86400)}j`;
      metaParts.push(`<span>prochain · ${nextStr}</span>`);
    }
    if (a.last_exit !== null && a.last_exit !== undefined) {
      const isOk = (a.last_exit === '0' || a.last_exit === 0 || String(a.last_exit).startsWith('0'));
      metaParts.push(`<span class="${isOk ? 'ok' : 'fail'}">exit ${escapeHtml(a.last_exit)}</span>`);
    }
    if (a.pid) metaParts.push(`<span>pid ${a.pid}</span>`);
    return `
      <div class="la-card ${cls}">
        <div class="la-top">
          <div>
            <div class="la-name">${escapeHtml(a.name)}</div>
            <div class="la-schedule">${escapeHtml(a.schedule || '')}</div>
          </div>
          ${tag}
        </div>
        <div class="la-meta">${metaParts.join('') || '<span>—</span>'}</div>
        <div class="la-actions">
          <button class="la-btn toggle ${a.loaded ? 'on' : ''}" data-label="${escapeHtml(a.label)}" data-act="toggle">${a.loaded ? 'Désactiver' : 'Activer'}</button>
          <button class="la-btn" data-label="${escapeHtml(a.label)}" data-act="run" ${a.loaded ? '' : 'disabled'}>Lancer maintenant</button>
        </div>
      </div>
    `;
  }).join('');
  document.querySelectorAll('.la-btn[data-act]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const label = btn.dataset.label;
      const act = btn.dataset.act;
      const url = act === 'toggle' ? `/api/agents/${encodeURIComponent(label)}/toggle` : `/api/agents/${encodeURIComponent(label)}/run`;
      btn.disabled = true;
      try {
        const r = await fetch(url, { method: 'POST' });
        const data = await r.json();
        if (!data.ok) alert(data.error || 'Erreur');
      } catch (e) { alert('Erreur réseau'); }
      finally { setTimeout(loadLaunchAgents, 500); }
    });
  });
}

// ---- Recenter ----
$('#btn-recenter').addEventListener('click', () => {
  layout.clear();
  renderMesh();
});

// ---- Theme ----
const savedTheme = localStorage.getItem('jarvis-theme') || 'light';
document.documentElement.setAttribute('data-theme', savedTheme);
$('#theme-toggle').addEventListener('click', () => {
  const cur = document.documentElement.getAttribute('data-theme') || 'light';
  const next = cur === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('jarvis-theme', next);
  renderMesh();
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') selectNode(null);
});

window.addEventListener('resize', () => {
  layout.clear();
  renderMesh();
});

loadTopology();
loadLaunchAgents();
setInterval(loadTopology, 8000);
setInterval(loadLaunchAgents, 10000);
</script>
</body>
